<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You got a secret message! 📬</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Fredoka', sans-serif; 
            background-color: #e3f2fd; /* Soft pastel light blue background */
        }

        /* Floating background stars from your sketch */
        .star {
            position: absolute;
            color: rgba(255, 255, 255, 0.8);
            font-size: 24px;
            pointer-events: none;
            animation: float-star 3s ease-in-out infinite alternate;
        }

        @keyframes float-star {
            0% { transform: translateY(0px) rotate(0deg) scale(1); }
            100% { transform: translateY(-10px) rotate(15deg) scale(1.1); }
        }

        /* Interactive Envelope Wrapper */
        .envelope-wrapper {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .envelope-wrapper:hover {
            transform: scale(1.03);
        }

        /* Smooth page transitions */
        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden select-none">

    <div class="star" style="top: 10%; left: 15%; animation-delay: 0s;">⭐</div>
    <div class="star" style="top: 15%; right: 15%; animation-delay: 0.5s;">⭐</div>
    <div class="star" style="top: 30%; left: 8%; animation-delay: 1s;">✨</div>
    <div class="star" style="top: 25%; right: 8%; animation-delay: 1.5s;">✨</div>
    <div class="star" style="bottom: 20%; left: 12%; animation-delay: 0.7s;">⭐</div>
    <div class="star" style="bottom: 15%; right: 12%; animation-delay: 1.2s;">✨</div>

    <div id="main-page" class="w-full max-w-md text-center space-y-8 z-10">
        <h1 class="text-2xl md:text-3xl font-semibold text-slate-700 tracking-wide leading-snug">
            Hey! You got a <span class="border-b-3 border-sky-400 pb-0.5">secret message</span>.<br>
            want to <span class="bg-pink-300 text-white px-2 py-0.5 rounded-md shadow-xs">open</span> it?
        </h1>

        <div onclick="openLetter()" class="envelope-wrapper flex justify-center py-4">
            <div class="w-64 h-40 bg-[#fffdf6] border-3 border-slate-600 rounded-lg relative shadow-xl flex items-center justify-center">
                <div class="absolute top-0 left-0 right-0 h-0 border-t-[80px] border-t-transparent border-l-[125px] border-l-transparent border-r-[125px] border-r-transparent pointer-events-none"></div>
                <svg class="absolute top-0 w-full h-full" viewBox="0 0 256 160" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2 2L128 90L254 2" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
                </svg>
                <div class="absolute top-[70px] text-3xl animate-bounce duration-1000">💖</div>
                <span class="absolute bottom-4 text-slate-500 font-bold tracking-widest text-lg">MAIL</span>
            </div>
        </div>

        <div class="flex justify-center items-center gap-6 relative h-16">
            <button onclick="openLetter()" class="bg-[#dca385] hover:bg-[#cd9274] text-white font-medium py-2 px-8 rounded-full border-2 border-slate-700 shadow-[4px_4px_0px_0px_rgba(71,85,105,1)] transition-all transform active:translate-x-0.5 active:translate-y-0.5 cursor-pointer text-lg">
                Yes
            </button>
            <button id="no-btn" onmouseover="moveNoButton()" onclick="moveNoButton()" class="absolute bg-[#eac5b2] text-slate-700 font-medium py-2 px-8 rounded-full border-2 border-slate-700 shadow-[4px_4px_0px_0px_rgba(71,85,105,1)] transition-all cursor-pointer text-lg whitespace-nowrap">
                No
            </button>
        </div>
    </div>

    <div id="message-page" class="hidden w-full max-w-sm text-center space-y-6 z-10 fade-in">
        
        <div class="bg-[#fffdf9] border-3 border-slate-700 rounded-2xl p-6 shadow-2xl relative">
            <h2 class="text-2xl font-bold text-slate-700 mb-4">I'm Sorry! 🥺</h2>
            
            <p class="text-slate-600 text-base leading-relaxed bg-sky-50 border border-sky-100 p-4 rounded-xl text-left font-medium shadow-inner">
                I'm so sorry for being a nuisance... Can you please add me back in the group? I miss you guys a lot.
            </p>

            <div class="text-[11px] text-slate-400 font-bold uppercase tracking-wider mt-4 border-t border-dashed border-slate-200 pt-3">
                🗓️ Pleading Sent: <span id="live-date"></span>
            </div>
        </div>

        <div class="flex flex-col items-center space-y-2 mt-4">
            <div class="w-40 h-40 rounded-2xl border-4 border-white shadow-xl overflow-hidden bg-white">
                <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?q=80&w=400&auto=format&fit=crop" 
                     alt="Innocent Pleading Cat" 
                     class="w-full h-full object-cover">
            </div>
            <div class="bg-white/90 border-2 border-slate-700 text-slate-700 text-xs font-bold py-1 px-4 rounded-full shadow-md">
                "please forgive me? look at my eyes"
            </div>
        </div>
    </div>

    <script>
        // Formulate and append local real-time date automatically
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('live-date').innerText = new Date().toLocaleDateString('en-US', options);

        function openLetter() {
            document.getElementById('main-page').classList.add('hidden');
            document.getElementById('message-page').classList.remove('hidden');
        }

        // Fun interaction code to make the 'No' button run away when hovered or clicked
        function moveNoButton() {
            const noBtn = document.getElementById('no-btn');
            
            // Generate safe alternate bounds across viewport quadrants
            const randomX = Math.floor(Math.random() * (window.innerWidth - 120));
            const randomY = Math.floor(Math.random() * (window.innerHeight - 60));
            
            // Displace button outside standard box hierarchy coordinates
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }
    </script>
</body>
</html>
